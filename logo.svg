<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- House shape -->
  <polygon points="36,38 52,22 68,38" fill="#e07b20"/>
  <rect x="40" y="38" width="24" height="20" fill="#e07b20"/>
  <!-- Door -->
  <rect x="49" y="48" width="7" height="10" fill="#122840"/>

  <!-- Wrench icon -->
  <g transform="translate(72, 30) rotate(-35)">
    <rect x="-3" y="-14" width="6" height="28" rx="3" fill="white" opacity="0.9"/>
    <circle cx="0" cy="-14" r="5" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <circle cx="0" cy="14" r="5" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
  </g>

  <!-- Text: AFFORDABLE -->
  <text x="98" y="34" font-family="Oswald, Arial Black, sans-serif" font-weight="700" font-size="18" fill="white" letter-spacing="1">AFFORDABLE</text>
  <!-- Text: QUALITY in orange -->
  <text x="98" y="54" font-family="Oswald, Arial Black, sans-serif" font-weight="700" font-size="18" fill="#e07b20" letter-spacing="1">QUALITY</text>
  <!-- Divider lines and subtitle -->
  <line x1="98" y1="59" x2="118" y2="59" stroke="white" stroke-width="1" opacity="0.4"/>
  <text x="122" y="63" font-family="Arial, sans-serif" font-size="8.5" fill="white" opacity="0.7" letter-spacing="1.5">APPLIANCE REPAIR</text>
  <line x1="232" y1="59" x2="252" y2="59" stroke="white" stroke-width="1" opacity="0.4"/>
</svg>
