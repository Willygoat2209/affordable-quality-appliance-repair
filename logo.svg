<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 68" width="340" height="68">

  <!-- Wrench icon, vertically centered at y=34 -->
  <g transform="translate(30, 34)">
    <!-- Handle -->
    <rect x="-4.5" y="-14" width="9" height="30" rx="4.5" fill="#e07b20"/>
    <!-- Top left jaw -->
    <rect x="-11" y="-20" width="9" height="11" rx="2.5" fill="#e07b20"/>
    <!-- Top right jaw -->
    <rect x="2" y="-20" width="9" height="11" rx="2.5" fill="#e07b20"/>
    <!-- Bottom open ring -->
    <circle cx="0" cy="17" r="5.5" fill="none" stroke="#e07b20" stroke-width="3.5"/>
  </g>

  <!-- Vertical divider -->
  <line x1="56" y1="12" x2="56" y2="56" stroke="#e07b20" stroke-width="1.5" opacity="0.45"/>

  <!-- AFFORDABLE - top line -->
  <text x="70" y="31"
    font-family="Oswald, 'Arial Narrow', Arial, sans-serif"
    font-weight="700"
    font-size="19"
    fill="white"
    letter-spacing="2.5">AFFORDABLE</text>

  <!-- QUALITY - bottom line in orange -->
  <text x="70" y="52"
    font-family="Oswald, 'Arial Narrow', Arial, sans-serif"
    font-weight="700"
    font-size="19"
    fill="#e07b20"
    letter-spacing="2.5">QUALITY</text>

  <!-- Decorative subtitle row -->
  <line x1="70" y1="59" x2="90" y2="59" stroke="white" stroke-width="1" opacity="0.3"/>
  <text x="94" y="63"
    font-family="Arial, sans-serif"
    font-size="7.5"
    fill="white"
    opacity="0.55"
    letter-spacing="3">APPLIANCE REPAIR</text>
  <line x1="252" y1="59" x2="272" y2="59" stroke="white" stroke-width="1" opacity="0.3"/>

</svg>
